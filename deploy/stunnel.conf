# TLS termination for KernelKV via stunnel.
#
# KernelKV speaks a plaintext binary protocol on localhost; TLS is terminated by
# a sidecar rather than compiled into the server. This is the standard pattern
# for datastores (Redis did exactly this before 6.0) — it keeps OpenSSL and the
# non-blocking TLS handshake state machine out of the server's edge-triggered
# hot path, and lets ops rotate certs / pick ciphers without touching the DB.
#
# Setup:
#   1. Generate a cert (self-signed for local testing):
#        openssl req -x509 -newkey rsa:2048 -nodes -days 365 \
#            -keyout key.pem -out cert.pem -subj "/CN=localhost"
#        cat cert.pem key.pem > kvs.pem
#   2. Run the server bound to loopback only:
#        ./kvs --port 1234
#   3. Run stunnel:
#        stunnel deploy/stunnel.conf
#   4. Clients connect with TLS to :6379; stunnel forwards plaintext to :1234.
#        openssl s_client -connect localhost:6379

foreground = yes
pid =

[kernelkv]
accept  = 0.0.0.0:6379      ; TLS-encrypted public endpoint
connect = 127.0.0.1:1234    ; plaintext KernelKV on loopback
cert    = kvs.pem           ; server certificate + private key
